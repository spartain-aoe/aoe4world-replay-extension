name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  extension:
    name: Chrome Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build all bundles + data
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Pack Chrome extension zip
        run: cd chrome-extension && zip -r ../chrome-extension-store.zip .

      - name: Create GitHub Release — Extension
        uses: softprops/action-gh-release@v2
        with:
          files: chrome-extension-store.zip
          generate_release_notes: true

      - name: Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: chrome-extension-store.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true

  launcher:
    name: Native Replay Launchers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack Steam native host installer zip
        run: |
          mkdir -p dist/native-host-steam
          cp native-host/aoe4_replay_setup.ps1 dist/native-host-steam/
          cp native-host/install.bat dist/native-host-steam/
          cp native-host/install-steam.bat dist/native-host-steam/
          cp native-host/uninstall.bat dist/native-host-steam/
          cd dist/native-host-steam
          zip -r ../../aoe4-replay-launcher-steam.zip .

      - name: Pack Microsoft Store / Xbox native host installer zip
        run: |
          mkdir -p dist/native-host-microsoft-store
          cp native-host/aoe4_replay_setup.ps1 dist/native-host-microsoft-store/
          cp native-host/install-microsoft-store.bat dist/native-host-microsoft-store/install.bat
          cp native-host/install-microsoft-store.bat dist/native-host-microsoft-store/
          cp native-host/uninstall.bat dist/native-host-microsoft-store/
          cd dist/native-host-microsoft-store
          zip -r ../../aoe4-replay-launcher-microsoft-store.zip .

      - name: Create GitHub Release — Launcher
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aoe4-replay-launcher-steam.zip
            aoe4-replay-launcher-microsoft-store.zip

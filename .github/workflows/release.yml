name: Build Release

on:
  push:
    branches:
      - api-summary-charts
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI on tag push
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          for attempt in {1..60}; do
            run_id="$(gh run list \
              --repo "$REPO" \
              --workflow "CI" \
              --branch "$REF_NAME" \
              --event push \
              --limit 10 \
              --json databaseId,headSha \
              --jq ".[] | select(.headSha == \"$SHA\") | .databaseId" \
              | head -n 1)"

            if [ -n "$run_id" ]; then
              gh run watch "$run_id" --repo "$REPO" --exit-status
              exit 0
            fi

            sleep 10
          done

          echo "Timed out waiting for CI run for $REF_NAME at $SHA" >&2
          exit 1

  extension:
    name: Chrome Extension
    runs-on: ubuntu-latest
    needs: wait-for-ci
    if: startsWith(github.ref, 'refs/tags/v') || contains(github.event.head_commit.message, '[publish-chrome]')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build all bundles + data
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Pack Chrome extension zip
        run: cd chrome-extension && zip -r ../chrome-extension-store.zip .

      - name: Create GitHub Release — Extension
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: chrome-extension-store.zip
          generate_release_notes: true

      - name: Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: chrome-extension-store.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true

  launcher:
    name: Native Replay Launcher
    runs-on: ubuntu-latest
    needs: wait-for-ci
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Pack native host installer zip
        run: cd native-host && zip -r ../aoe4-replay-launcher.zip .

      - name: Create GitHub Release — Launcher
        uses: softprops/action-gh-release@v2
        with:
          files: aoe4-replay-launcher.zip

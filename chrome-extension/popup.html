<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 360px;
      background: #1a1a1a;
      color: #e9ecef;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0 0 12px;
    }
    h2 {
      margin: 0;
      font-size: 15px;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .icon-btn {
      background: none;
      border: 1px solid transparent;
      color: #adb5bd;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 4px;
      line-height: 1;
    }
    .icon-btn:hover { background: #2a2a2a; color: #e9ecef; }
    .icon-btn.active { background: #2a2a2a; color: #e9ecef; border-color: #495057; }
    .empty {
      color: #6c757d;
      text-align: center;
      padding: 24px 0;
    }
    .fav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-bottom: 1px solid #333;
    }
    .fav-item:last-child { border-bottom: none; }
    .fav-info { flex: 1; min-width: 0; }
    .fav-header { font-weight: 600; }
    .fav-header a { color: #4dabf7; text-decoration: none; }
    .fav-header a:hover { text-decoration: underline; }
    .fav-sub { color: #adb5bd; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fav-date { color: #6c757d; font-size: 11px; }
    .fav-actions { display: flex; gap: 6px; }
    .btn {
      background: none;
      border: 1px solid #495057;
      color: #e9ecef;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn:hover { background: #333; }
    .btn-play { border-color: #2ea043; color: #2ea043; }
    .btn-play:hover { background: #2ea04320; }
    .btn-del { border-color: #dc3545; color: #dc3545; }
    .btn-del:hover { background: #dc354520; }
    .count { color: #6c757d; font-size: 12px; font-weight: normal; }

    /* Settings panel */
    #settings { display: none; padding: 4px 2px 12px; border-bottom: 1px solid #333; margin-bottom: 12px; }
    #settings.open { display: block; }
    .setting {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 4px;
    }
    .setting input[type="checkbox"] {
      margin: 2px 0 0;
      flex-shrink: 0;
      cursor: pointer;
      width: 14px;
      height: 14px;
      accent-color: #2ea043;
    }
    .setting.sub {
      padding-left: 24px;
    }
    .setting.sub .name { font-weight: 500; }
    .setting input[type="checkbox"]:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .setting input[type="checkbox"]:disabled + label {
      opacity: 0.4;
      cursor: default;
    }
    .setting label {
      flex: 1;
      cursor: pointer;
      line-height: 1.35;
    }
    .setting .name { font-weight: 600; }
    .setting .desc { color: #adb5bd; font-size: 11px; margin-top: 2px; }
    .reload-hint {
      color: #ffd43b;
      font-size: 11px;
      padding: 6px 4px 0;
      display: none;
    }
    .reload-hint.show { display: block; }
    .footer {
      display: flex;
      justify-content: center;
      padding: 10px 0 2px;
      border-top: 1px solid #333;
      margin-top: 8px;
    }
    .footer a {
      color: #6c757d;
      font-size: 11px;
      text-decoration: none;
    }
    .footer a:hover { color: #adb5bd; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h2>&#9733; Saved Replays <span class="count" id="count"></span></h2>
    <button class="icon-btn" id="settings-toggle" title="Settings" aria-label="Settings" aria-expanded="false">&#9881;</button>
  </div>
  <div id="settings" aria-hidden="true">
    <div class="setting">
      <input type="checkbox" id="opt-parse" />
      <label for="opt-parse">
        <div class="name">Parse additional game data</div>
        <div class="desc">Download and parse replay data from game pages. Required for custom charts and in-game player colors.</div>
      </label>
    </div>
    <div class="setting sub">
      <input type="checkbox" id="opt-charts" />
      <label for="opt-charts">
        <div class="name">Inject custom charts</div>
        <div class="desc">Add resource-gathered, army-composition, and build-order charts to game pages.</div>
      </label>
    </div>
    <div class="setting sub">
      <input type="checkbox" id="opt-recolor" />
      <label for="opt-recolor">
        <div class="name">Use in-game player colors</div>
        <div class="desc">Recolor aoe4world's default red/blue/etc. swatches with the actual colors from each replay file.</div>
      </label>
    </div>
    <div class="setting">
      <input type="checkbox" id="opt-debug" />
      <label for="opt-debug">
        <div class="name">Show debug logs</div>
        <div class="desc">Print verbose diagnostic logs to the page DevTools console.</div>
      </label>
    </div>
    <div class="reload-hint" id="reload-hint">Reload any open aoe4world tabs to fully apply this change.</div>
  </div>
  <div id="list"></div>
  <div class="footer">
    <a href="https://github.com/spartain-aoe/aoe4world-replay-extension/issues/new?template=bug_report.yml" target="_blank">Report a bug</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
